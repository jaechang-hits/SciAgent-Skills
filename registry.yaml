    category: "structural-biology-drug-discovery"
    path: "skills/structural-biology-drug-discovery/molfeat-molecular-featurization/SKILL.md"
    description: "Molecular featurization hub (100+ featurizers) for ML. Convert SMILES to numerical representations via fingerprints (ECFP, MACCS, MAP4), descriptors (RDKit 2D, Mordred), pretrained models (ChemBERTa, GIN, Graphormer), and pharmacophore features. Scikit-learn compatible transformers with parallelization, caching, and state persistence. For QSAR, virtual screening, similarity search, and deep learning on molecules."
    date_added: "2026-02-17"

  - name: "pyopenms-mass-spectrometry"
    type: skill
    sub_type: toolkit
    category: "proteomics-protein-engineering"
    path: "skills/proteomics-protein-engineering/pyopenms-mass-spectrometry/SKILL.md"
    description: "Mass spectrometry data processing with PyOpenMS. LC-MS/MS proteomics and metabolomics — mzML/mzXML file I/O, signal processing (smoothing, peak picking, centroiding), feature detection and linking across samples, peptide/protein identification with FDR control, untargeted metabolomics pipelines. For simple spectral matching use matchms."
    date_added: "2026-02-17"

  - name: "matchms-spectral-matching"
    type: skill
    sub_type: toolkit
    category: "proteomics-protein-engineering"
    path: "skills/proteomics-protein-engineering/matchms-spectral-matching/SKILL.md"
    description: "Mass spectrometry spectral matching and metabolite identification with matchms. Import spectra (mzML, MGF, MSP, JSON), filter/normalize peaks, compute spectral similarity (cosine, modified cosine, fingerprint), build reproducible processing pipelines, identify metabolites from spectral libraries. For full LC-MS/MS proteomics pipelines use pyopenms."
    date_added: "2026-02-17"

  - name: "pytdc-therapeutics-data-commons"
    type: skill
    sub_type: database
    category: "structural-biology-drug-discovery"
    path: "skills/structural-biology-drug-discovery/pytdc-therapeutics-data-commons/SKILL.md"
    description: "Therapeutics Data Commons (TDC) — AI-ready drug discovery dataset platform. Access curated ADME, toxicity, DTI, DDI datasets with scaffold/cold splits, standardized evaluation metrics (5-seed protocol), molecular oracles for optimization, and ADMET benchmark groups. For chemical database queries use chembl-database-bioactivity; for molecular featurization use molfeat."
    date_added: "2026-02-17"

  - name: "histolab-wsi-processing"
    type: skill
    sub_type: toolkit
    category: "cell-biology"
    path: "skills/cell-biology/histolab-wsi-processing/SKILL.md"
    description: "Whole slide image processing for digital pathology. Tissue detection, tile extraction (random, grid, score-based), filter pipelines for H&E/IHC preprocessing. Use for dataset preparation, tile-based deep learning, and slide quality assessment. For advanced spatial proteomics or multiplexed imaging use pathml."
    date_added: "2026-02-17"

  - name: "vaex-dataframes"
    type: skill
    sub_type: toolkit
    category: "scientific-computing"
    path: "skills/scientific-computing/vaex-dataframes/SKILL.md"
    description: "Out-of-core DataFrame library for billion-row datasets using lazy evaluation and memory-mapped files. Use when data exceeds available RAM (10 GB to terabytes) and needs fast aggregation, filtering, virtual columns, and visualization without loading into memory. Supports HDF5, Apache Arrow, Parquet, CSV I/O with cloud storage (S3, GCS, Azure). Built-in ML transformers (scaling, encoding, PCA, K-means) with scikit-learn bridge. For in-memory speed use polars; for distributed computing use dask."
    date_added: "2026-02-17"

  - name: "drugbank-database-access"
    type: skill
    sub_type: database
    category: "structural-biology-drug-discovery"
    path: "skills/structural-biology-drug-discovery/drugbank-database-access/SKILL.md"
    description: "Parse and query DrugBank local XML database for drug information, interactions, targets, and chemical properties. Search drugs by ID/name/CAS, extract drug-drug interactions with severity, map targets/enzymes/transporters, compute molecular similarity from SMILES. Primary access via local XML (downloaded); REST API available but rate-limited. For live bioactivity queries use chembl-database-bioactivity; for compound property lookups use pubchem-compound-search."
    date_added: "2026-02-17"

  - name: "arboreto-grn-inference"
    type: skill
    sub_type: pipeline
    category: "genomics-bioinformatics"
    path: "skills/genomics-bioinformatics/arboreto-grn-inference/SKILL.md"
    description: "Gene regulatory network inference from expression data using GRNBoost2 (gradient boosting) or GENIE3 (Random Forest). Load expression matrix, optionally filter by transcription factors, infer TF-target-importance links, filter and save network. Dask-parallelized for single-cell scale. Core component of the SCENIC pipeline."
    date_added: "2026-02-17"

  - name: "hmdb-database"
    type: skill
    sub_type: database
    category: "proteomics-protein-engineering"
    path: "skills/proteomics-protein-engineering/hmdb-database/SKILL.md"
    description: "Parse and query HMDB local XML (220K+ metabolites) for chemical properties, biological context, disease/biomarker associations, spectral data (NMR/MS), and cross-database mapping (KEGG, PubChem, ChEBI, DrugBank). No public REST API — local XML parsing only."
    date_added: "2026-02-17"

  - name: "pdb-database"
    type: skill
    sub_type: database
    category: "structural-biology-drug-discovery"
    path: "skills/structural-biology-drug-discovery/pdb-database/SKILL.md"
    description: "Query RCSB PDB (200K+ experimental structures) via rcsb-api Python SDK. Text, attribute, sequence, and structure similarity search. Fetch metadata via Schema or GraphQL. Download PDB/mmCIF coordinate files. For AlphaFold predicted structures use alphafold-database-access."
    date_added: "2026-02-17"

  - name: "scientific-brainstorming"
    type: skill
    sub_type: guide
    category: "scientific-writing"
    path: "skills/scientific-writing/scientific-brainstorming/SKILL.md"
    description: "Structured ideation methods for scientific research: SCAMPER, Six Thinking Hats, Morphological Analysis, TRIZ, Biomimicry, Provocation, Random Input, Reverse Assumptions, Future Backwards. Decision framework for method selection by challenge type. 5-phase brainstorming workflow."
    date_added: "2026-02-17"

  - name: "hypogenic-hypothesis-generation"
    type: skill
    sub_type: pipeline
    category: "scientific-computing"
    path: "skills/scientific-computing/hypogenic-hypothesis-generation/SKILL.md"
    description: "LLM-driven hypothesis generation and testing on tabular datasets. Three methods: HypoGeniC (data-driven), HypoRefine (literature+data synergy), Union (mechanistic combination). Iterative refinement, Redis caching, multi-hypothesis inference."
    date_added: "2026-02-17"

  - name: "metabolomics-workbench-database"
    type: skill
    sub_type: database
    category: "proteomics-protein-engineering"
    path: "skills/proteomics-protein-engineering/metabolomics-workbench-database/SKILL.md"
    description: "Query Metabolomics Workbench REST API (4,200+ studies, NIH-funded) for metabolite identification, study discovery, RefMet name standardization, MS m/z precursor ion searches, MetStat study filtering, and gene/protein annotations."
    date_added: "2026-02-17"

  - name: "ena-database"
    type: skill
    sub_type: database
    category: "genomics-bioinformatics"
    path: "skills/genomics-bioinformatics/ena-database/SKILL.md"
    description: "European Nucleotide Archive (ENA) REST API access for genomic sequences, raw reads, assemblies, and annotations. Portal API search with query syntax, Browser API retrieval (XML/FASTA/EMBL), file reports for FASTQ/BAM download URLs, taxonomy queries, cross-references."
    date_added: "2026-02-17"

  - name: "gwas-database"
    type: skill
    sub_type: database
    category: "genomics-bioinformatics"
    path: "skills/genomics-bioinformatics/gwas-database/SKILL.md"
    description: "NHGRI-EBI GWAS Catalog REST API for SNP-trait associations from published genome-wide association studies. Query studies, associations, variants, traits, genes, and summary statistics. No authentication required."
    date_added: "2026-02-17"

  - name: "reactome-database"
    type: skill
    sub_type: database
    category: "systems-biology-multiomics"
    path: "skills/systems-biology-multiomics/reactome-database/SKILL.md"
    description: "Query Reactome pathway database via REST API. Pathway queries, entity retrieval, keyword search, gene list enrichment analysis, pathway hierarchy, cross-references. Content Service and Analysis Service. For KEGG pathways use kegg-database; for protein interactions use string-database-ppi."
    date_added: "2026-02-17"

  - name: "pydicom-medical-imaging"
    type: skill
    sub_type: toolkit
    category: "cell-biology"
    path: "skills/cell-biology/pydicom-medical-imaging/SKILL.md"
    description: "Pure Python DICOM library for medical imaging (CT, MRI, X-ray, ultrasound). Read/write DICOM files, extract pixel data as NumPy arrays, access/modify metadata tags, apply windowing (VOI LUT), anonymize PHI, build DICOM from scratch, process series into 3D volumes. For whole-slide pathology use histolab; for NIfTI neuroimaging use nibabel."
    date_added: "2026-02-17"

  - name: "deepchem"
    type: skill
    sub_type: toolkit
    category: "structural-biology-drug-discovery"
    path: "skills/structural-biology-drug-discovery/deepchem/SKILL.md"
    description: "Deep learning framework for drug discovery and materials science. 60+ models (GCN, GAT, AttentiveFP, MPNN, DMPNN, ChemBERTa, GROVER), 50+ molecular featurizers, MoleculeNet benchmarks, hyperparameter optimization, transfer learning. Unified load-featurize-split-train-evaluate API. For fingerprint-only cheminformatics use rdkit-cheminformatics; for featurization hub without training use molfeat-molecular-featurization."
    date_added: "2026-02-17"
